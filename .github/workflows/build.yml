name: Build and push Docker images

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  build-wyoming-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push wyoming-api
        uses: docker/build-push-action@v5
        with:
          context: ./wyoming-api
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_BASE }}/wyoming-api:latest
            ${{ env.IMAGE_BASE }}/wyoming-api:${{ github.sha }}
          cache-from: type=gha,scope=wyoming-api
          cache-to: type=gha,mode=max,scope=wyoming-api

  build-whisper-cpp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push whisper-cpp (Intel SYCL)
        uses: docker/build-push-action@v5
        with:
          context: ./whisper-cpp
          build-args: |
            WHISPER_CPP_VERSION=1.7.4
            BUILD_FROM=intel/oneapi:2025.0.1-0-devel-ubuntu24.04
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_BASE }}/whisper-cpp:latest
            ${{ env.IMAGE_BASE }}/whisper-cpp:${{ github.sha }}
          cache-from: type=gha,scope=whisper-cpp
          cache-to: type=gha,mode=max,scope=whisper-cpp
          # whisper-cpp build takes ~60min; GitHub Actions large runner recommended
